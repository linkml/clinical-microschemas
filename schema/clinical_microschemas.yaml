  DataTypeEnum:
    name: DataTypeEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/DataTypeEnum
    description: The data type of an observation value
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      decimal:
        text: decimal
        description: Decimal number
      integer:
        text: integer
        description: Integer number
      enum:
        text: enum
        description: Enumerated value
      boolean:
        text: boolean
        description: Boolean value
      string:
        text: string
        description: String value
      numeric:
        text: numeric
        description: decimal or integer - from dbGAP data types
      code:
        text: code
        description: data are a list of acceptable values or a controlled vocabulary,
          from dbGAP data types, same as enum
      uriorcurie:
        text: uriorcurie
        description: A URI or CURIE value
  MethodEnum:
    name: MethodEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/MethodEnum
    description: The method used for a measurement or observation
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      anthropometry:
        text: anthropometry
        description: physical measurement of the human body, including height, weight,
          and other body dimensions
      survey:
        text: survey
        description: list of questions given to a participant for data collection
          purposes - the survey is filled out by the participant independently
      interview:
        text: interview
        description: series of questions posed to a participant by an interviewer
          for data collection purposes
      calculated:
        text: calculated
        description: clinical record that results from a calculation rather than being
          directly measured
      spirometry:
        text: spirometry
        description: breathing test used to assess lung function
      body_plesmography:
        text: body_plesmography
        description: precise pulmonary function test where the patient sits in a sealed
          chamber and breathes into a specialized mouthpiece. This method uses Boyle's
          Law  and is considered a "gold standard"
      gli:
        text: gli
        description: a standard reference range and calculator for spirometry and
          lung function tests published by the Global Lung Function Initiative in
          2012
      gli_global:
        text: gli_global
        description: a standard reference range and calculator for spirometry and
          lung function tests published by the Global Lung Function Initiative in
          2022. This is an update of the 2012 standard that is more ethnically diverse
      nhanesiii:
        text: nhanesiii
        description: standard reference equations for spirometry published in 2005
  InstrumentEnum:
    name: InstrumentEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/InstrumentEnum
    description: The instrument used for a measurement
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      wall_mounted_stadiometer:
        text: wall_mounted_stadiometer
        description: fixed, high-precision medical device used to measure human height,
          consisting of a vertical measuring rod or tape fastened to a wall with a
          sliding headpiece
        meaning: MMO:0000105
      flexible_measuring_tape:
        text: flexible_measuring_tape
        description: flexible tape used to measure height or body circumference
      portable_stadiometer:
        text: portable_stadiometer
        description: portable device used to measure height, typically used in field
          settings
      anthropometer_rod:
        text: anthropometer_rod
        description: rigid rod-based instrument used to measure body dimensions including
          height
      sonar_stadiometer:
        text: sonar_stadiometer
        description: ultrasound-based device used to measure height without contact
      mechanical_beam_balance_scale:
        text: mechanical_beam_balance_scale
        description: medical device used to measure human weight
        meaning: MMO:0000087
      digital_scale:
        text: digital_scale
        description: electronic device used to measure human weight using strain gauge
          sensors
        meaning: MMO:0000087
      spring_scale:
        text: spring_scale
        description: mechanical device that measures weight by the displacement of
          a spring
      spirometer:
        text: spirometer
        description: medical device that measures lung function by recording the amount
          and speed of air a person can inhale and exhale
      vitalograph:
        text: vitalograph
        description: a portable medical device that measures lung function by recording
          the amount and speed of air a person can inhale and exhale
      body_plesmograph:
        text: body_plesmograph
        description: sealed, clear chamber with a mouthpiece for a person to breath
          through
      peak_flow_meter:
        text: peak_flow_meter
        description: portable, handheld device used to measure how fast and hard a
          person can exhale
  ReagentKitEnum:
    name: ReagentKitEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/ReagentKitEnum
    description: The reagent kit used for a measurement
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      placeholder:
        text: placeholder
        description: Placeholder value
  BodyPositionEnum:
    name: BodyPositionEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/BodyPositionEnum
    description: The body position during a measurement
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      supine:
        text: supine
        description: Lying face up
      standing:
        text: standing
        description: Standing upright
      sitting:
        text: sitting
        description: Seated position
  ContextEnum:
    name: ContextEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/ContextEnum
    description: The context in which a measurement was taken
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      fasted_8_hrs:
        text: fasted_8_hrs
        description: Fasted for 8 hours
      fasted_12_hrs:
        text: fasted_12_hrs
        description: Fasted for 12 hours
      before_bronchodilator:
        text: before_bronchodilator
        description: Before bronchodilator administration
      after_bronchodilator:
        text: after_bronchodilator
        description: After bronchodilator administration
      taking_lipid_lowering_medications:
        text: taking_lipid_lowering_medications
        description: While taking lipid-lowering medications
      before_physical_activity:
        text: before_physical_activity
        description: Before physical activity
      during_physical_activity:
        text: during_physical_activity
        description: During physical activity
      after_physical_activity:
        text: after_physical_activity
        description: After physical activity
      during_procedure:
        text: during_procedure
        description: During a procedure
      taking_diabetes_medication:
        text: taking_diabetes_medication
        description: While taking diabetes medication
      lowest:
        text: lowest
        description: Lowest recorded value
  CollectedByEnum:
    name: CollectedByEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/CollectedByEnum
    description: Who collected the measurement
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      doctor:
        text: doctor
        description: Collected by a doctor
      nurse:
        text: nurse
        description: Collected by a nurse
