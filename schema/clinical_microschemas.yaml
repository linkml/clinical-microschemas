name: clinical-microschemas
description: 'Clinical microschemas for composable clinical data elements.

  Imports and extends the LinkML Microschema Profile.'
title: Clinical Microschemas
see_also:
- https://linkml.github.io/clinical-microschemas
id: https://w3id.org/linkml/clinical-microschemas
version: 0.1.0
imports:
- linkml:types
- https://raw.githubusercontent.com/linkml/linkml-microschema-profile/v0.3.0/src/linkml_microschema_profile/schema/linkml_microschema_profile
license: MIT
prefixes:
  cms:
    prefix_prefix: cms
    prefix_reference: https://w3id.org/linkml/clinical-microschemas/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  PATO:
    prefix_prefix: PATO
    prefix_reference: http://purl.obolibrary.org/obo/PATO_
  bdchm:
    prefix_prefix: bdchm
    prefix_reference: https://w3id.org/bdchm/
  OBA:
    prefix_prefix: OBA
    prefix_reference: http://purl.obolibrary.org/obo/OBA_
  OMOP:
    prefix_prefix: OMOP
    prefix_reference: https://athena.ohdsi.org/search-terms/terms/
  LOINC:
    prefix_prefix: LOINC
    prefix_reference: https://loinc.org/
  UCUM:
    prefix_prefix: UCUM
    prefix_reference: https://units-of-measurement.org/
  UBERON:
    prefix_prefix: UBERON
    prefix_reference: http://purl.obolibrary.org/obo/UBERON_
  MONDO:
    prefix_prefix: MONDO
    prefix_reference: http://purl.obolibrary.org/obo/MONDO_
  HP:
    prefix_prefix: HP
    prefix_reference: http://purl.obolibrary.org/obo/HP_
  MMO:
    prefix_prefix: MMO
    prefix_reference: http://purl.obolibrary.org/obo/MMO_
  RxNorm:
    prefix_prefix: RxNorm
    prefix_reference: http://purl.bioontology.org/ontology/RXNORM/
  ISO11179:
    prefix_prefix: ISO11179
    prefix_reference: http://purl.org/iso11179/
  example:
    prefix_prefix: example
    prefix_reference: http://www.example.org/rdf#
default_prefix: cms
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  HistoricalStatusEnum:
    name: HistoricalStatusEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/HistoricalStatusEnum
    description: Indicates whether something is present, absent, historical, or its
      status is unknown.
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      PRESENT:
        text: PRESENT
        description: Was present in the patient at observation time.
      ABSENT:
        text: ABSENT
        description: Was absent in the patient at observation time.
      UNKNOWN:
        text: UNKNOWN
        description: Was of unknown status in the patient at observation time.
      HISTORICAL:
        text: HISTORICAL
        description: Was present in the patient historically.
  ProvenanceEnum:
    name: ProvenanceEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/ProvenanceEnum
    description: A set of values indicating the source or origin of a clinical record.
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      EHR_BILLING_DIAGNOSIS:
        text: EHR_BILLING_DIAGNOSIS
        description: Diagnosis from EHR billing.
      EHR_CHIEF_COMPLAINT:
        text: EHR_CHIEF_COMPLAINT
        description: Chief complaint from EHR.
      EHR_ENCOUNTER_DIAGNOSIS:
        text: EHR_ENCOUNTER_DIAGNOSIS
        description: Encounter diagnosis from EHR.
      EHR_EPISODE_ENTRY:
        text: EHR_EPISODE_ENTRY
        description: Episode entry from EHR.
      EHR_PROBLEM_LIST_ENTRY:
        text: EHR_PROBLEM_LIST_ENTRY
        description: Problem list entry from EHR.
      FIRST_POSITION_CONDITION:
        text: FIRST_POSITION_CONDITION
        description: First position condition.
      PRIMARY_CONDITION:
        text: PRIMARY_CONDITION
        description: Primary condition.
      SECONDARY_CONDITION:
        text: SECONDARY_CONDITION
        description: Secondary condition.
      NLP_DERIVED:
        text: NLP_DERIVED
        description: Derived from natural language processing.
      OBSERVATION_RECORDED_FROM_EHR:
        text: OBSERVATION_RECORDED_FROM_EHR
        description: Observation recorded from EHR.
      PATIENT_SELF_REPORTED_CONDITION:
        text: PATIENT_SELF_REPORTED_CONDITION
        description: Patient self-reported condition.
      REFERRAL_RECORD:
        text: REFERRAL_RECORD
        description: From referral record.
      TUMOR_REGISTRY:
        text: TUMOR_REGISTRY
        description: From tumor registry.
      WORKING_DIAGNOSIS:
        text: WORKING_DIAGNOSIS
        description: Working diagnosis.
      CLINICAL_DIAGNOSIS:
        text: CLINICAL_DIAGNOSIS
        description: Clinical diagnosis.
  ConditionSeverityEnum:
    name: ConditionSeverityEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/ConditionSeverityEnum
    description: A subjective assessment of the severity of a condition.
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      MILD:
        text: MILD
        description: Lower intensity condition.
        meaning: OMOP:4116992
      MODERATE:
        text: MODERATE
        description: Medium intensity condition.
        meaning: OMOP:3272197
      SEVERE:
        text: SEVERE
        description: Higher intensity condition.
        meaning: OMOP:4087703
  FamilyRelationshipEnum:
    name: FamilyRelationshipEnum
    definition_uri: https://w3id.org/linkml/clinical-microschemas/FamilyRelationshipEnum
    description: Values describing kinship connections between individuals.
    from_schema: https://w3id.org/linkml/clinical-microschemas
    permissible_values:
      ONESELF:
        text: ONESELF
        description: Self-reference.
      NATURAL_PARENT:
        text: NATURAL_PARENT
        description: Mother or father unspecified.
        meaning: OMOP:4029630
      NATURAL_FATHER:
        text: NATURAL_FATHER
        description: Biological father.
        meaning: OMOP:4321888
      NATURAL_MOTHER:
        text: NATURAL_MOTHER
        description: Biological mother.
        meaning: OMOP:4277283
      NATURAL_SIBLING:
        text: NATURAL_SIBLING
        description: Sister or brother unspecified.
        meaning: OMOP:4218412
      NATURAL_BROTHER:
        text: NATURAL_BROTHER
        description: Biological brother.
        meaning: OMOP:4263682
      NATURAL_SISTER:
        text: NATURAL_SISTER
        description: Biological sister.
        meaning: OMOP:4251326
      NATURAL_CHILD:
        text: NATURAL_CHILD
        description: Biological offspring.
        meaning: OMOP:4326600
      BLOOD_RELATIVE:
        text: BLOOD_RELATIVE
        description: Generic consanguineous relation.
        meaning: OMOP:4053608
