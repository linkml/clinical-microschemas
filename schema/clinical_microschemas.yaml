    - method
    - instrument
    - reagent_kit
    - calculated_from
    - body_location
    - body_position
    - context
    - collected_by
    - data_type
    - ClinicalMeasurementRecord_age_at_measurement
    class_uri: cms:HumanBodyWeightRecord
    rules:
    - preconditions:
        slot_conditions:
          measurement_type:
            name: measurement_type
            any_of:
            - equals_string: OBA:VT0001259
            - equals_string: OMOP:903121
            - equals_string: LOINC:29463-7
      postconditions:
        slot_conditions:
          unit:
            name: unit
            any_of:
            - equals_string: kg
            - equals_string: '[lb_av]'
            - equals_string: g
          instrument:
            name: instrument
            any_of:
            - equals_string: mechanical_beam_balance_scale
            - equals_string: digital_scale
            - equals_string: spring_scale
          data_type:
            name: data_type
            equals_string: decimal
          measurement_value:
            name: measurement_value
            range: decimal
            minimum_value: 0
            maximum_value: 700
  HumanBodyWeightRecord001:
    name: HumanBodyWeightRecord001
    definition_uri: https://w3id.org/linkml/clinical-microschemas/HumanBodyWeightRecord001
    description: Measurement of the force exerted by a human body on a mechanical
      beam balance due to gravity
    from_schema: https://w3id.org/linkml/clinical-microschemas
    is_a: HumanBodyWeightRecord
    slots:
    - ClinicalMeasurementRecord_subject_identifier
    - ClinicalMeasurementRecord_measurement_type
    - ClinicalMeasurementRecord_measurement_value
    - unit
    - method
    - instrument
    - reagent_kit
    - calculated_from
    - body_location
    - body_position
    - context
    - collected_by
    - data_type
    - ClinicalMeasurementRecord_age_at_measurement
    class_uri: cms:HumanBodyWeightRecord001
    rules:
    - preconditions:
        slot_conditions:
          unit:
            name: unit
            any_of:
            - equals_string: kg
          instrument:
            name: instrument
            any_of:
            - equals_string: mechanical_beam_balance_scale
      postconditions:
        slot_conditions:
          data_type:
            name: data_type
            equals_string: decimal
          measurement_value:
            name: measurement_value
            range: decimal
            minimum_value: 0
            maximum_value: 550
  BodyMassIndexRecord:
    name: BodyMassIndexRecord
    definition_uri: https://w3id.org/linkml/clinical-microschemas/BodyMassIndexRecord
    description: A calculated numerical quantity representing an individual's weight-to-height
      ratio. BMI is calculated as weight (kg) divided by height (m) squared.
    from_schema: https://w3id.org/linkml/clinical-microschemas
    is_a: ClinicalMeasurementRecord
    slots:
    - ClinicalMeasurementRecord_subject_identifier
    - ClinicalMeasurementRecord_measurement_type
    - ClinicalMeasurementRecord_measurement_value
    - unit
    - method
    - instrument
    - reagent_kit
    - calculated_from
    - body_location
    - body_position
    - context
    - collected_by
    - data_type
    - ClinicalMeasurementRecord_age_at_measurement
    class_uri: cms:BodyMassIndexRecord
    rules:
    - preconditions:
        slot_conditions:
          measurement_type:
            name: measurement_type
            any_of:
            - equals_string: OBA:0002045455
            - equals_string: OMOP:3038553
            - equals_string: LOINC:39156-5
      postconditions:
        slot_conditions:
          unit:
            name: unit
            any_of:
            - equals_string: kg/m2
          method:
            name: method
            any_of:
            - equals_string: calculated
          data_type:
            name: data_type
            id_prefixes:
            - decimal
          measurement_value:
            name: measurement_value
            range: decimal
            minimum_value: 5
            maximum_value: 200
          calculated_from:
            name: calculated_from
            equals_expression: '{HumanBodyWeightRecord001} / ({HumanBodyHeightRecord001}
              / 100)^2'
