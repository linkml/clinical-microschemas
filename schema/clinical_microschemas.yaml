classes:
  ClinicalMeasurementRecord:
    name: ClinicalMeasurementRecord
    definition_uri: https://w3id.org/linkml/clinical-microschemas/ClinicalMeasurementRecord
    instantiates:
    - MicroschemaDefinition
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: clinical
    description: A data structure with key and value attributes that represents a
      single observation. This can include results of clinical labs, scores and indices,
      socioeconomic, or behavioral observations.
    from_schema: https://w3id.org/linkml/clinical-microschemas
    mappings:
    - bdchm:Observation
    slots:
    - ClinicalMeasurementRecord_subject_identifier
    - ClinicalMeasurementRecord_measurement_type
    - ClinicalMeasurementRecord_measurement_value
    - unit
    - method
    - instrument
    - reagent_kit
    - calculated_from
    - body_location
    - body_position
    - context
    - collected_by
    - data_type
    - ClinicalMeasurementRecord_age_at_measurement
    slot_usage:
      subject_identifier:
        name: subject_identifier
        required: true
      measurement_type:
        name: measurement_type
        required: true
      measurement_value:
        name: measurement_value
        required: true
      age_at_measurement:
        name: age_at_measurement
        required: true
    class_uri: bdchm:Observation
  ConditionStatusRecord:
    name: ConditionStatusRecord
    definition_uri: https://w3id.org/linkml/clinical-microschemas/ConditionStatusRecord
    instantiates:
    - MicroschemaDefinition
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: clinical
    description: Record suggesting the presence of a disease or medical condition
      stated as a diagnosis, sign, or symptom
    from_schema: https://w3id.org/linkml/clinical-microschemas
    mappings:
    - bdchm:Condition
    slots:
    - ConditionStatusRecord_subject_identifier
    - ConditionStatusRecord_condition_type
    - associated_evidence
    - instrument
    - age_at_condition_start
    - age_at_condition_end
    - ConditionStatusRecord_condition_status
    - condition_provenance
    - condition_severity
    - ConditionStatusRecord_relationship_to_participant
    slot_usage:
      subject_identifier:
        name: subject_identifier
        required: true
      condition_type:
        name: condition_type
        required: true
      condition_status:
        name: condition_status
        required: true
      relationship_to_participant:
        name: relationship_to_participant
        required: true
    class_uri: bdchm:Condition
  DrugStatusRecord:
    name: DrugStatusRecord
    definition_uri: https://w3id.org/linkml/clinical-microschemas/DrugStatusRecord
    instantiates:
    - MicroschemaDefinition
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: clinical
    description: Record suggesting exposure to a medication
    from_schema: https://w3id.org/linkml/clinical-microschemas
    mappings:
    - bdchm:DrugExposure
    slots:
    - DrugStatusRecord_subject_identifier
    - DrugStatusRecord_drug_type
    - method
    - collected_by
    - age_at_drug_start
    - age_at_drug_end
    - route_of_administration
    - dose
    - frequency
    - indication
    slot_usage:
      subject_identifier:
        name: subject_identifier
        required: true
      drug_type:
        name: drug_type
        required: true
    class_uri: bdchm:DrugExposure
  ProcedureStatusRecord:
    name: ProcedureStatusRecord
    definition_uri: https://w3id.org/linkml/clinical-microschemas/ProcedureStatusRecord
    instantiates:
    - MicroschemaDefinition
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: clinical
    description: Record of activity or process ordered by or carried out by a healthcare
      provider for a diagnostic or therapeutic reason
    from_schema: https://w3id.org/linkml/clinical-microschemas
    mappings:
    - bdchm:Procedure
    slots:
    - ProcedureStatusRecord_subject_identifier
    - ProcedureStatusRecord_procedure_type
    - method
    - collected_by
    - age_at_procedure_start
    - age_at_procedure_end
    slot_usage:
      subject_identifier:
        name: subject_identifier
        required: true
      procedure_type:
        name: procedure_type
        required: true
    class_uri: bdchm:Procedure
  HumanBodyHeightRecord:
    name: HumanBodyHeightRecord
    definition_uri: https://w3id.org/linkml/clinical-microschemas/HumanBodyHeightRecord
    description: Measurement of linear distance of a human body from the bottom of
      a flat foot to the top-most point of the head
    from_schema: https://w3id.org/linkml/clinical-microschemas
    is_a: ClinicalMeasurementRecord
    slots:
    - ClinicalMeasurementRecord_subject_identifier
    - ClinicalMeasurementRecord_measurement_type
    - ClinicalMeasurementRecord_measurement_value
    - unit
    - method
    - instrument
    - reagent_kit
    - calculated_from
    - body_location
    - body_position
    - context
    - collected_by
    - data_type
    - ClinicalMeasurementRecord_age_at_measurement
    class_uri: cms:HumanBodyHeightRecord
    rules:
    - preconditions:
        slot_conditions:
          measurement_type:
            name: measurement_type
            any_of:
            - equals_string: OBA:VT0001253
            - equals_string: OMOP:903133
            - equals_string: LOINC:3036277
      postconditions:
        slot_conditions:
          unit:
            name: unit
            any_of:
            - equals_string: cm
            - equals_string: '[in_i]'
            - equals_string: m
            - equals_string: '[ft_i]'
          instrument:
            name: instrument
            any_of:
            - equals_string: wall_mounted_stadiometer
            - equals_string: flexible_measuring_tape
            - equals_string: portable_stadiometer
            - equals_string: anthropometer_rod
            - equals_string: sonar_stadiometer
          body_position:
            name: body_position
            any_of:
            - range: BodyPositionEnum
          data_type:
            name: data_type
            equals_string: decimal
          measurement_value:
            name: measurement_value
            range: decimal
            minimum_value: 0
            maximum_value: 300
  HumanBodyHeightRecord001:
    name: HumanBodyHeightRecord001
    definition_uri: https://w3id.org/linkml/clinical-microschemas/HumanBodyHeightRecord001
    description: Measurement of linear distance of a standing human body from the
      bottom of a flat foot to the top-most point of the head measured with a wall-mounted
      stadiometer
    from_schema: https://w3id.org/linkml/clinical-microschemas
    is_a: HumanBodyHeightRecord
    slots:
    - ClinicalMeasurementRecord_subject_identifier
    - ClinicalMeasurementRecord_measurement_type
    - ClinicalMeasurementRecord_measurement_value
    - unit
    - method
    - instrument
    - reagent_kit
    - calculated_from
    - body_location
    - body_position
    - context
    - collected_by
    - data_type
    - ClinicalMeasurementRecord_age_at_measurement
    class_uri: cms:HumanBodyHeightRecord001
    rules:
    - preconditions:
        slot_conditions:
          instrument:
            name: instrument
            any_of:
            - equals_string: wall_mounted_stadiometer
          unit:
            name: unit
            any_of:
            - equals_string: cm
          body_position:
            name: body_position
            any_of:
            - equals_string: standing
      postconditions:
        slot_conditions:
          measurement_value:
            name: measurement_value
            range: decimal
            minimum_value: 20
            maximum_value: 220
          unit:
            name: unit
            equals_string: cm
  HumanBodyWeightRecord:
    name: HumanBodyWeightRecord
    definition_uri: https://w3id.org/linkml/clinical-microschemas/HumanBodyWeightRecord
    description: Measurement of the force exerted by a human body on a scale due to
      gravity
    from_schema: https://w3id.org/linkml/clinical-microschemas
    is_a: ClinicalMeasurementRecord
    slots:
